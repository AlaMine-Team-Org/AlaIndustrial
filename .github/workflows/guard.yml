# Installed into the PUBLIC repo at: .github/workflows/guard.yml
# The safety net that keeps the public repo pristine. Runs the same cleanliness
# scan the /alamod-publish skill runs locally — so even a hand-made push that
# bypasses the skill will FAIL loudly if it introduces Cyrillic, AI traces,
# secrets, or denylisted paths.
name: Cleanliness Guard

on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so commit metadata can be scanned

      - name: Scan working tree (Cyrillic / AI traces / secrets / denylisted paths)
        run: bash .github/scripts/scan-clean.sh .

      - name: Scan commit metadata (no AI co-authors / traces)
        run: |
          if git log --format='%an%n%ae%n%cn%n%ce%n%B' \
             | grep -iE 'co-authored-by|claude|anthropic|noreply@anthropic'; then
            echo "::error::AI trace found in commit author/message metadata"
            exit 1
          fi
          echo "✅ commit metadata clean"
