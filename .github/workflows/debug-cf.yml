# TEMPORARY debug workflow — inspect CurseForge's accepted game versions so we can
# set release.yml `game_versions` to valid names. Delete after use.
name: Debug CF versions

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Query CurseForge versions
        run: |
          set -e
          TOKEN='${{ secrets.CURSEFORGE_TOKEN }}'
          echo "=== version types (id -> name) ==="
          curl -s "https://minecraft.curseforge.com/api/game/version-types?token=${TOKEN}" \
            | jq -r '.[] | "\(.id)\t\(.name)"'
          echo
          echo "=== entry for id 16500 ==="
          curl -s "https://minecraft.curseforge.com/api/game/versions?token=${TOKEN}" \
            | jq -r '.[] | select(.id==16500)'
          echo
          echo "=== entries whose name contains 26 ==="
          curl -s "https://minecraft.curseforge.com/api/game/versions?token=${TOKEN}" \
            | jq -r '.[] | select(.name | test("26")) | "\(.id)\t\(.gameVersionTypeID)\t\(.name)"'
          echo
          echo "=== entries named Fabric (or containing Fabric) ==="
          curl -s "https://minecraft.curseforge.com/api/game/versions?token=${TOKEN}" \
            | jq -r '.[] | select(.name | test("Fabric";"i")) | "\(.id)\t\(.gameVersionTypeID)\t\(.name)"'
