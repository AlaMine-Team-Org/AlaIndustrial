# Installed into the PUBLIC repo at: .github/workflows/release.yml
# Triggered by pushing a tag `vX.Y.Z`. Builds the mod, publishes to CurseForge
# with a MARKDOWN changelog, and creates a matching GitHub Release.
#
# Why two publish steps: mc-publish does NOT send CurseForge's `changelogType`,
# so CurseForge stores the changelog as plain text and the Markdown never renders.
# We therefore upload to CurseForge with itsmeow/curseforge-upload, which sets
# `changelog_type: markdown` explicitly, and keep mc-publish only for the GitHub
# Release. The display name carries the loader in brackets, e.g. "... v0.1.1 [Fabric]".
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Hard gate: never publish a tree that carries Cyrillic, forbidden vendor
      # traces, secrets or denylisted paths — even if the guard workflow is skipped.
      - name: Cleanliness gate
        run: bash .github/scripts/scan-clean.sh .

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      # In-world behaviour tests must pass before a release ships. Required tests
      # gate the build; tests marked optional (unfinished features) only warn.
      - name: Game tests
        run: ./gradlew runGameTest --no-daemon --stacktrace

      # Resolve the production jar path and read the changelog into a multi-line output.
      - name: Resolve artifact and changelog
        id: meta
        run: |
          JAR=$(ls build/libs/*.jar | grep -vE -- '-(dev|sources|javadoc)\.jar$' | head -1)
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"
          {
            echo 'changelog<<__CHANGELOG_EOF__'
            cat CHANGELOG.md
            echo '__CHANGELOG_EOF__'
          } >> "$GITHUB_OUTPUT"

      # CurseForge upload with an explicit MARKDOWN changelog and a loader-tagged name.
      # game_versions are matched by name; if "26.2" ever collides, prefix it with its
      # type, e.g. "Minecraft 1.21:26.2". Only the Minecraft version and the modloader
      # are sent — the Java version is deliberately omitted: CurseForge rejects newer
      # Java tags as "invalid dependency" (error 1009), and it is not needed for the
      # compatibility filter.
      - name: Publish to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: 1597723
          game_endpoint: minecraft
          file_path: ${{ steps.meta.outputs.jar }}
          display_name: AlaIndustrial ${{ github.ref_name }} [Fabric]
          changelog: ${{ steps.meta.outputs.changelog }}
          changelog_type: markdown
          game_versions: "26.2,Fabric"
          release_type: release

      # GitHub Release (jar + changelog). mc-publish renders Markdown fine on GitHub.
      - name: Create GitHub Release
        uses: Kira-NT/mc-publish@v3.3.0
        with:
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          name: AlaIndustrial ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
