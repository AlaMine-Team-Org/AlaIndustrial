# Installed into the PUBLIC repo at: .github/workflows/release.yml
# Triggered by pushing a tag `vX.Y.Z`. Builds BOTH loaders (Fabric + NeoForge),
# publishes TWO files to CurseForge and TWO versions to Modrinth (one per
# loader) with a MARKDOWN changelog, and creates one GitHub Release carrying
# both jars.
#
# Why a direct API curl (not mc-publish/itsmeow) for CurseForge: mc-publish does
# NOT send CurseForge's `changelogType`, so the Markdown never renders; itsmeow's
# output→input hop collapses newlines. We POST to the upload API with
# `jq --rawfile` (preserves newlines) + changelogType=markdown. mc-publish is kept
# only for the GitHub Release. Each file's displayName carries its loader in
# brackets, e.g. "... v0.1.5 [Fabric]" / "... v0.1.5 [NeoForge]".
# Modrinth uses separate version numbers per loader (`X.Y.Z+fabric` and
# `X.Y.Z+neoforge`) so Fabric API remains a Fabric-only required dependency.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

env:
  # Standard release mode. Keep this explicit so accidental one-loader releases
  # cannot happen by editing individual upload steps. Emergency single-loader
  # repairs should use a separate, deliberate workflow.
  PUBLISH_LOADERS: both

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Release mode guard
        id: mode
        run: |
          case "${PUBLISH_LOADERS}" in
            both)
              echo "publish_fabric=true" >> "$GITHUB_OUTPUT"
              echo "publish_neoforge=true" >> "$GITHUB_OUTPUT"
              echo "Release mode: both loaders"
              ;;
            *)
              echo "::error::PUBLISH_LOADERS must be 'both' for the standard release workflow (got '${PUBLISH_LOADERS}')"
              exit 1
              ;;
          esac

      # Hard gate: never publish a tree that carries Cyrillic, forbidden vendor
      # traces, secrets or denylisted paths — even if the guard workflow is skipped.
      - name: Cleanliness gate
        run: bash .github/scripts/scan-clean.sh .

      # One root build compiles all modules (common + fabric + neoforge) and runs
      # the Fabric server gametests as part of :fabric:build.
      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      # In-world behaviour tests for BOTH loaders must pass before a release ships.
      # :fabric:runGameTest = Fabric server gametests; :neoforge:runGameTests =
      # NeoForge gameTestServer world tests. Required tests gate the build; tests
      # marked optional (unfinished features) only warn.
      - name: Game tests (both loaders)
        run: ./gradlew :fabric:runGameTest :neoforge:runGameTests --no-daemon --stacktrace

      # Resolve BOTH production jars and validate them before any upload. Guards:
      #  1. each jar exists and is non-empty,
      #  2. the version in each filename matches the tag (catches a stale jar),
      #  3. each jar actually carries its loader's metadata — so the [Fabric] /
      #     [NeoForge] label can never be pinned to the wrong artifact.
      - name: Resolve & validate artifacts
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FABRIC_JAR=$(ls fabric/build/libs/*.jar | grep -vE -- '-(dev|sources|javadoc)\.jar$' | head -1)
          NEOFORGE_JAR=$(ls neoforge/build/libs/*.jar | grep -vE -- '-(dev|sources|javadoc)\.jar$' | head -1)
          for f in "$FABRIC_JAR" "$NEOFORGE_JAR"; do
            [ -s "$f" ] || { echo "::error::missing or empty jar: $f"; exit 1; }
          done
          case "$FABRIC_JAR"   in *"-$VERSION.jar") ;; *) echo "::error::fabric jar version != $VERSION ($FABRIC_JAR)"; exit 1;; esac
          case "$NEOFORGE_JAR" in *"-$VERSION.jar") ;; *) echo "::error::neoforge jar version != $VERSION ($NEOFORGE_JAR)"; exit 1;; esac
          unzip -l "$FABRIC_JAR"   | grep -q 'fabric.mod.json'              || { echo "::error::fabric jar lacks fabric.mod.json — wrong artifact?"; exit 1; }
          unzip -l "$NEOFORGE_JAR" | grep -q 'META-INF/neoforge.mods.toml' || { echo "::error::neoforge jar lacks neoforge.mods.toml — wrong artifact?"; exit 1; }
          python .github/scripts/verify-artifacts.py \
            --version "$VERSION" \
            --fabric "$FABRIC_JAR" \
            --neoforge "$NEOFORGE_JAR" \
            --output release-manifest.json
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "fabric_jar=$FABRIC_JAR"     >> "$GITHUB_OUTPUT"
          echo "neoforge_jar=$NEOFORGE_JAR" >> "$GITHUB_OUTPUT"
          echo "Fabric:   $FABRIC_JAR"
          echo "NeoForge: $NEOFORGE_JAR"

      # Modrinth project ACLWFBlU (slug: ala-industrial). We publish separate
      # versions per loader because Modrinth dependencies are version-level, not
      # file-level: Fabric requires Fabric API, NeoForge does not.
      - name: Check Modrinth upload targets
        id: modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          [ -n "$MODRINTH_TOKEN" ] || { echo "::error::MODRINTH_TOKEN secret is missing or empty"; exit 1; }
          VERSION="${{ steps.meta.outputs.version }}"
          versions=$(curl -sSf --retry 5 --retry-delay 15 --retry-all-errors --connect-timeout 20 --max-time 180 \
            "https://api.modrinth.com/v2/project/ACLWFBlU/version" \
            -H "User-Agent: AlaMine-Team-Org/AlaIndustrial-release/1.0")
          fabric_exists=$(printf '%s' "$versions" | jq -r --arg v "$VERSION+fabric" 'any(.[]; .version_number == $v)')
          neoforge_exists=$(printf '%s' "$versions" | jq -r --arg v "$VERSION+neoforge" 'any(.[]; .version_number == $v)')
          echo "fabric_exists=$fabric_exists" >> "$GITHUB_OUTPUT"
          echo "neoforge_exists=$neoforge_exists" >> "$GITHUB_OUTPUT"
          echo "Modrinth Fabric target $VERSION+fabric exists: $fabric_exists"
          echo "Modrinth NeoForge target $VERSION+neoforge exists: $neoforge_exists"

      - name: Publish Fabric to Modrinth
        if: steps.mode.outputs.publish_fabric == 'true' && steps.modrinth.outputs.fabric_exists != 'true'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          JAR: ${{ steps.meta.outputs.fabric_jar }}
        run: |
          data=$(jq -n \
            --rawfile changelog CHANGELOG.md \
            --arg project "ACLWFBlU" \
            --arg version "$VERSION+fabric" \
            --arg name "Ala Industrial $VERSION [Fabric]" \
            '{
              name: $name,
              version_number: $version,
              changelog: $changelog,
              dependencies: [{project_id: "P7dR8mSH", dependency_type: "required"}],
              game_versions: ["26.2"],
              version_type: "release",
              loaders: ["fabric"],
              featured: false,
              status: "listed",
              project_id: $project,
              file_parts: ["fabric_file"],
              primary_file: "fabric_file",
              environment: "client_and_server"
            }')
          # Retry up to 5x, surfacing the Modrinth error body on failure (same pattern as the
          # CurseForge upload steps — curl -sSf hides the response body on HTTP errors).
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS --connect-timeout 20 --max-time 180 -o modrinth_resp.json -w '%{http_code}' -X POST \
              "https://api.modrinth.com/v2/version" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -H "User-Agent: AlaMine-Team-Org/AlaIndustrial-release/1.0" \
              --form-string "data=$data" \
              -F "fabric_file=@$JAR")
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Modrinth Fabric upload OK (HTTP $code)"
              cat modrinth_resp.json
              exit 0
            fi
            echo "::warning::Modrinth Fabric upload attempt $attempt failed with HTTP $code; body:"
            cat modrinth_resp.json || true
            [ "$attempt" -lt 5 ] && sleep 15
          done
          echo "::error::Modrinth Fabric upload failed after 5 attempts (last HTTP $code). Response body above."
          exit 1

      - name: Publish NeoForge to Modrinth
        if: steps.mode.outputs.publish_neoforge == 'true' && steps.modrinth.outputs.neoforge_exists != 'true'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          JAR: ${{ steps.meta.outputs.neoforge_jar }}
        run: |
          data=$(jq -n \
            --rawfile changelog CHANGELOG.md \
            --arg project "ACLWFBlU" \
            --arg version "$VERSION+neoforge" \
            --arg name "Ala Industrial $VERSION [NeoForge]" \
            '{
              name: $name,
              version_number: $version,
              changelog: $changelog,
              dependencies: [],
              game_versions: ["26.2"],
              version_type: "release",
              loaders: ["neoforge"],
              featured: false,
              status: "listed",
              project_id: $project,
              file_parts: ["neoforge_file"],
              primary_file: "neoforge_file",
              environment: "client_and_server"
            }')
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS --connect-timeout 20 --max-time 180 -o modrinth_resp.json -w '%{http_code}' -X POST \
              "https://api.modrinth.com/v2/version" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -H "User-Agent: AlaMine-Team-Org/AlaIndustrial-release/1.0" \
              --form-string "data=$data" \
              -F "neoforge_file=@$JAR")
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Modrinth NeoForge upload OK (HTTP $code)"
              cat modrinth_resp.json
              exit 0
            fi
            echo "::warning::Modrinth NeoForge upload attempt $attempt failed with HTTP $code; body:"
            cat modrinth_resp.json || true
            [ "$attempt" -lt 5 ] && sleep 15
          done
          echo "::error::Modrinth NeoForge upload failed after 5 attempts (last HTTP $code). Response body above."
          exit 1

      # Resolve the CurseForge modloader IDs. Fabric is pinned (7499, proven across
      # releases). NeoForge is resolved dynamically by name from the versions API
      # (the CURSEFORGE_TOKEN is the upload token, which this endpoint accepts), so a
      # future id change does not silently break the NeoForge upload. Minecraft's
      # version id (16498) stays pinned — name-matching "26.2" wrongly picks a stale
      # legacy entry (id 16500), rejected with error 1009.
      - name: Resolve CurseForge loader IDs
        id: loaders
        env:
          CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          [ -n "$CF_TOKEN" ] || { echo "::error::CURSEFORGE_TOKEN secret is missing or empty"; exit 1; }
          versions=$(curl -sSf --retry 5 --retry-delay 15 --retry-all-errors --connect-timeout 20 --max-time 180 "https://minecraft.curseforge.com/api/game/versions?token=$CF_TOKEN")
          NEOFORGE_ID=$(printf '%s' "$versions" | jq -r 'map(select(.name=="NeoForge")) | .[0].id // empty')
          [ -n "$NEOFORGE_ID" ] || { echo "::error::could not resolve the NeoForge modloader id from the versions API"; exit 1; }
          echo "neoforge_id=$NEOFORGE_ID" >> "$GITHUB_OUTPUT"
          echo "NeoForge modloader id: $NEOFORGE_ID (Fabric pinned: 7499, Minecraft pinned: 16498, Client/Server env pinned: 9638/9639)"

      # Best-effort public index check before hitting the CurseForge upload API.
      # If cfwidget is unavailable we fail closed: a re-run could otherwise create
      # duplicate files because the upload API has no documented "list files" route.
      - name: Check CurseForge upload targets
        id: curseforge
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          widget=$(curl -sSf --retry 5 --retry-delay 15 --retry-all-errors --connect-timeout 20 --max-time 180 \
            "https://api.cfwidget.com/minecraft/mc-mods/1597723" \
            -H "User-Agent: AlaMine-Team-Org/AlaIndustrial-release/1.0")
          python - "$VERSION" "$widget" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          version = sys.argv[1]
          data = json.loads(sys.argv[2])
          names = []
          for f in data.get("files", []):
              names.append(str(f.get("display", "")))
              names.append(str(f.get("name", "")))
          fabric = any(f"v{version} [Fabric]" in name or f"{version} [Fabric]" in name for name in names)
          neoforge = any(f"v{version} [NeoForge]" in name or f"{version} [NeoForge]" in name for name in names)
          print(f"fabric_exists={str(fabric).lower()}")
          print(f"neoforge_exists={str(neoforge).lower()}")
          PY
          echo "CurseForge Fabric target exists: $(grep '^fabric_exists=' "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "CurseForge NeoForge target exists: $(grep '^neoforge_exists=' "$GITHUB_OUTPUT" | cut -d= -f2)"

      # Two CurseForge uploads, one per loader, as SEPARATE steps so a partial
      # failure (one loader up, the other down) is unambiguous in the job log and
      # you re-run only what failed. Same changelog for both.
      - name: Publish Fabric to CurseForge
        if: steps.mode.outputs.publish_fabric == 'true' && steps.curseforge.outputs.fabric_exists != 'true'
        env:
          CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          JAR: ${{ steps.meta.outputs.fabric_jar }}
          DISPLAY_NAME: Ala Industrial ${{ github.ref_name }} [Fabric]
        run: |
          metadata=$(jq -n \
            --rawfile changelog CHANGELOG.md \
            --arg name "$DISPLAY_NAME" \
            '{changelog: $changelog, changelogType: "markdown", displayName: $name, gameVersions: [16498, 7499, 9638, 9639], releaseType: "release"}')
          # 16498 = Minecraft 26.2, 7499 = Fabric, 9638 = Client, 9639 = Server.
          # Client/Server env tags are required since CurseForge started enforcing the
          # "environment group" (errorCode 1021) around 2026-07; prior releases uploaded
          # without them. Retry up to 5x, but surface the CurseForge error body on the
          # final failure (curl -sSf hides the response body on HTTP errors).
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS --connect-timeout 20 --max-time 180 -o cf_resp.json -w '%{http_code}' -X POST \
              "https://minecraft.curseforge.com/api/projects/1597723/upload-file" \
              -H "X-Api-Token: $CF_TOKEN" \
              --form-string "metadata=$metadata" \
              -F "file=@$JAR")
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "CurseForge Fabric upload OK (HTTP $code)"
              cat cf_resp.json
              exit 0
            fi
            echo "::warning::CurseForge Fabric upload attempt $attempt failed with HTTP $code; body:"
            cat cf_resp.json || true
            [ "$attempt" -lt 5 ] && sleep 15
          done
          echo "::error::CurseForge Fabric upload failed after 5 attempts (last HTTP $code). Response body above."
          exit 1

      - name: Publish NeoForge to CurseForge
        if: steps.mode.outputs.publish_neoforge == 'true' && steps.curseforge.outputs.neoforge_exists != 'true'
        env:
          CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          JAR: ${{ steps.meta.outputs.neoforge_jar }}
          NEOFORGE_ID: ${{ steps.loaders.outputs.neoforge_id }}
          DISPLAY_NAME: Ala Industrial ${{ github.ref_name }} [NeoForge]
        run: |
          metadata=$(jq -n \
            --rawfile changelog CHANGELOG.md \
            --arg name "$DISPLAY_NAME" \
            --argjson nf "$NEOFORGE_ID" \
            '{changelog: $changelog, changelogType: "markdown", displayName: $name, gameVersions: [16498, $nf, 9638, 9639], releaseType: "release"}')
          # 16498 = Minecraft 26.2, $nf = NeoForge (resolved), 9638 = Client, 9639 = Server
          # (required by CurseForge's "environment group" enforcement, see Fabric step).
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS --connect-timeout 20 --max-time 180 -o cf_resp.json -w '%{http_code}' -X POST \
              "https://minecraft.curseforge.com/api/projects/1597723/upload-file" \
              -H "X-Api-Token: $CF_TOKEN" \
              --form-string "metadata=$metadata" \
              -F "file=@$JAR")
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "CurseForge NeoForge upload OK (HTTP $code)"
              cat cf_resp.json
              exit 0
            fi
            echo "::warning::CurseForge NeoForge upload attempt $attempt failed with HTTP $code; body:"
            cat cf_resp.json || true
            [ "$attempt" -lt 5 ] && sleep 15
          done
          echo "::error::CurseForge NeoForge upload failed after 5 attempts (last HTTP $code). Response body above."
          exit 1

      # One GitHub Release carrying BOTH loader jars. mc-publish renders Markdown
      # fine on GitHub.
      - name: Create GitHub Release
        uses: Kira-NT/mc-publish@v3.3.0
        with:
          files: |
            fabric/build/libs/!(*-@(dev|sources|javadoc)).jar
            neoforge/build/libs/!(*-@(dev|sources|javadoc)).jar
            release-manifest.json
          name: Ala Industrial ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
