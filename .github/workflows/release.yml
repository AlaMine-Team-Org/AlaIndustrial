# Installed into the PUBLIC repo at: .github/workflows/release.yml
# Triggered by pushing a tag `vX.Y.Z`. Builds the mod, publishes to CurseForge
# with a MARKDOWN changelog, and creates a matching GitHub Release.
#
# Why two publish steps: mc-publish does NOT send CurseForge's `changelogType`,
# so CurseForge stores the changelog as plain text and the Markdown never renders.
# We therefore upload to CurseForge with itsmeow/curseforge-upload, which sets
# `changelog_type: markdown` explicitly, and keep mc-publish only for the GitHub
# Release. The display name carries the loader in brackets, e.g. "... v0.1.1 [Fabric]".
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Hard gate: never publish a tree that carries Cyrillic, forbidden vendor
      # traces, secrets or denylisted paths — even if the guard workflow is skipped.
      - name: Cleanliness gate
        run: bash .github/scripts/scan-clean.sh .

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      # In-world behaviour tests must pass before a release ships. Required tests
      # gate the build; tests marked optional (unfinished features) only warn.
      - name: Game tests
        run: ./gradlew runGameTest --no-daemon --stacktrace

      # Resolve the production jar path.
      - name: Resolve artifact
        id: meta
        run: |
          JAR=$(ls build/libs/*.jar | grep -vE -- '-(dev|sources|javadoc)\.jar$' | head -1)
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"

      # CurseForge upload via a DIRECT API call (not itsmeow/curseforge-upload).
      # Why: passing the changelog through a GitHub Actions output→input hop
      # (`${{ steps.meta.outputs.changelog }}` into `with:`) collapses the newlines of a
      # multi-line value, so CurseForge receives the notes as ONE line and renders the
      # Markdown as escaped plain text (\#, \*). We instead read CHANGELOG.md straight
      # from disk into the metadata JSON with `jq --rawfile`, which preserves newlines,
      # and send changelogType=markdown. Endpoint/headers per the CurseForge upload API
      # (same as the action used: POST {game}.curseforge.com/api/projects/{id}/upload-file,
      # X-Api-Token header, multipart metadata + file).
      # game_versions uses explicit numeric CurseForge IDs, NOT names: matching "26.2"
      # by name wrongly picks a stale legacy entry (id 16500), rejected with error 1009.
      #   16498 = Minecraft 26.2 · 7499 = Fabric (modloader)
      # Look up IDs for a new version via:
      #   https://minecraft.curseforge.com/api/game/versions?token=TOKEN
      - name: Publish to CurseForge
        env:
          CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          JAR: ${{ steps.meta.outputs.jar }}
          DISPLAY_NAME: Ala Industrial ${{ github.ref_name }} [Fabric]
        run: |
          metadata=$(jq -n \
            --rawfile changelog CHANGELOG.md \
            --arg name "$DISPLAY_NAME" \
            '{changelog: $changelog, changelogType: "markdown", displayName: $name, gameVersions: [16498, 7499], releaseType: "release"}')
          curl -sSf -X POST \
            "https://minecraft.curseforge.com/api/projects/1597723/upload-file" \
            -H "X-Api-Token: $CF_TOKEN" \
            --form-string "metadata=$metadata" \
            -F "file=@$JAR"

      # GitHub Release (jar + changelog). mc-publish renders Markdown fine on GitHub.
      - name: Create GitHub Release
        uses: Kira-NT/mc-publish@v3.3.0
        with:
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          name: Ala Industrial ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
