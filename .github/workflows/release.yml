# Installed into the PUBLIC repo at: .github/workflows/release.yml
# Triggered by pushing a tag `vX.Y.Z`. Builds the mod and publishes the JAR to
# CurseForge, and creates a matching GitHub Release. Release notes come from the
# matching section of CHANGELOG.md.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Hard gate: never publish a tree that carries Cyrillic, forbidden vendor
      # traces, secrets or denylisted paths — even if the guard workflow is skipped.
      - name: Cleanliness gate
        run: bash .github/scripts/scan-clean.sh .

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Publish to CurseForge
        uses: Kira-NT/mc-publish@v3.3.0
        with:
          # --- CurseForge ---
          curseforge-id: 1597723
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- Artifact (remapped production jar; excludes dev/sources/javadoc) ---
          files: build/libs/!(*-@(dev|sources|javadoc)).jar

          # --- Metadata ---
          name: AlaIndustrial ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: '26.2'
          java: '25'
          dependencies: |
            fabric-api(required)

          # --- Changelog: mc-publish extracts the section matching this version ---
          changelog-file: CHANGELOG.md

          # --- Also create a GitHub Release with the jar attached ---
          github-token: ${{ secrets.GITHUB_TOKEN }}
